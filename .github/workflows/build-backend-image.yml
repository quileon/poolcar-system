name: Build and Push Backend Image

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/**"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/**"

jobs:
  build-backend:
    runs-on: ubuntu-latest
    environment: gitea
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(awk -F'"' '/^version =/ {print $2}' backend/Cargo.toml)" >> $GITHUB_OUTPUT

      - name: Docker buildx
        uses: docker/setup-buildx-action@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: gitea.quilavr.top/quilavr/poolcar-system
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}-backend
            type=semver,pattern={{major}}-backend,value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}}-backend,value=${{ steps.version.outputs.version }}
            type=raw,value=latest-backend

      - name: Login and Push
        uses: docker/login-action@v3
        with:
          registry: gitea.quilavr.top
          username: ${{ vars.USERNAME }}
          password: ${{ secrets.PASSWORD_TOKEN }}

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
