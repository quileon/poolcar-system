name: Build and Push Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'

jobs:
  build-backend:
    runs-on: ubuntu-latest
    environment: gitea
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: echo "version=$(awk -F'"' '/^version =/ {print $2}' backend/Cargo.toml)" >> $GITHUB_OUTPUT

      - name: Docker buildx
        uses: docker/setup-buildx-action@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: gitea.quileon.me/quileon/poolcar-system
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}-backend
            type=semver,pattern={{major}}-backend,value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}}-backend,value=${{ steps.version.outputs.version }}
            type=raw,value=latest-backend

      - name: Login and Push
        uses: docker/login-action@v3
        with:
          registry: gitea.quileon.me
          username: ${{ vars.USERNAME }}
          password: ${{ secrets.PASSWORD_TOKEN }}

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  build-frontend:
    runs-on: ubuntu-latest
    environment: gitea
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(jq -r .version frontend/package.json)" >> $GITHUB_OUTPUT

      - name: Docker buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: gitea.quileon.me/quileon/poolcar-system
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}-frontend
            type=semver,pattern={{major}}-frontend,value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}}-frontend,value=${{ steps.version.outputs.version }}
            type=raw,value=latest-frontend

      - name: Login and Push
        uses: docker/login-action@v3
        with:
          registry: gitea.quileon.me
          username: ${{ vars.USERNAME }}
          password: ${{ secrets.PASSWORD_TOKEN }}

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            PUBLIC_API_BASE_URL=https://poolcar.quileon.me/api

  deploy:
      needs: [build-backend, build-frontend] 
      if: |
        always() && 
        (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
        (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
      runs-on: ubuntu-latest
      steps:
        - name: Trigger Komodo Redeployment
          run: |
            curl -X POST https://komodo.quileon.me/listener/github/stack/6972df1fc056e4b0f54a2d66/deploy \
            -H "Content-Type: application/json" \
            -d '{"ref": "${{ github.ref }}", "before": "${{ github.event.before }}", "after": "${{ github.event.after }}"}'
