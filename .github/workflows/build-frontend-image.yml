name: Build and Push Frontend Image

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/**"
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/**"

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    environment: gitea
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(jq -r .version frontend/package.json)" >> $GITHUB_OUTPUT

      - name: Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: gitea.quilavr.top/quilavr/poolcar-system
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}-frontend
            type=semver,pattern={{major}}-frontend,value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}}-frontend,value=${{ steps.version.outputs.version }}
            type=raw,value=latest-frontend

      - name: Login and Push
        uses: docker/login-action@v3
        with:
          registry: gitea.quilavr.top
          username: ${{ vars.USERNAME }}
          password: ${{ secrets.PASSWORD_TOKEN }}

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PUBLIC_API_BASE_URL=https://poolcar.quilavr.top/api
            PUBLIC_WS_BASE_URL=wss://poolcar.quilavr.top/ws
