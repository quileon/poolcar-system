services:
  valkey:
    image: docker.io/valkey/valkey:9-alpine
    container_name: environment-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: valkey-server --appendonly no --save 300 1 --save 60 100
    volumes:
      - ${HOME}/Services/valkey:/data

  postgres:
    image: docker.io/postgres:18-alpine
    container_name: environment-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ${HOME}/Services/postgres:/var/lib/postgresql/data
