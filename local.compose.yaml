services:
  valkey:
    image: docker.io/valkey/valkey:9-alpine
    container_name: poolcar-system-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: valkey-server --appendonly no --save 300 1 --save 60 100
    volumes:
      - ${VALKEY_DIR}:/data

  postgres:
    image: docker.io/postgres:18-alpine
    container_name: poolcar-system-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${POSTGRES_DIR}:/var/lib/postgresql/data
