services:
  valkey:
    image: docker.io/valkey/valkey:9-alpine
    container_name: poolcar-system-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: valkey-server --appendonly no --save 300 1 --save 60 100
    volumes:
      - ${VALKEY_DIR}:/data

  postgres:
    image: docker.io/postgres:18-alpine
    container_name: poolcar-system-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${POSTGRES_DIR}:/var/lib/postgresql/data

  backend:
    image: gitea.quileon.me/quileon/poolcar-system:latest-backend
    container_name: poolcar-system-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:7270"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MQTT_URL: ${MQTT_URL}
      MQTT_CLIENT: ${MQTT_CLIENT}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
    depends_on:
      - postgres
      - valkey
